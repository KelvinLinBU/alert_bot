name: Pokemon Restock Monitor

on:
  schedule:
    - cron: "2/5 * * * *"

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pokemon-restock-monitor
  cancel-in-progress: true

jobs:
  check-bluesky:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Download repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install requests
        run: python -m pip install requests

      - name: Check Bluesky
        run: python pokemon_restock_bot.py