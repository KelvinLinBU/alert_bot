name: Pokemon Restock Monitor

on:
  schedule:
    - cron: "*/5 * * * *"

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pokemon-restock-monitor
  cancel-in-progress: true

jobs:
  check-bluesky:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Download repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests websockets

      - name: Verify packages
        run: |
          python -c "import requests; print('requests installed')"
          python -c "import websockets; print('websockets installed:', websockets.__version__)"

      - name: Run restock bot
        run: python pokemon_restock_bot.py